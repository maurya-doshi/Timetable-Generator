name: Deploy to Render & update GitHub Deployment status

on:
  push:
    branches:
      - main  # Change this to your default branch if not 'main'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Trigger Render Deployment
      - name: Trigger Render Deployment
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Create GitHub Deployment
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          ref: ${{ github.sha }}

      - name: Set GitHub Deployment Status (in_progress)
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          state: in_progress
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment-url: https://timetable-generator-1-u6sa.onrender.com

      # Wait for deployment (optional – implement logic if Render supports build status webhooks or polling)

      - name: Set GitHub Deployment Status (success)
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          state: success
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment-url: https://timetable-generator-1-u6sa.onrender.com
